<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>Humm · Her Health Hub — PCOS Care Plan V1</title>
</head>
<body>
<div id="root"></div>
<noscript style="display:block;padding:24px;font-family:sans-serif">JavaScript must be enabled.</noscript>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js" crossorigin></script>
<script type="text/babel" data-presets="react">
const CSS_STYLES = `@import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#E9EDE8}
#root{min-height:100vh}

/* ── TOKENS ── */
:root{
  --bg:#E9EDE8; --surface:#FFFFFF; --surface2:#F3F6F1; --surface3:#EDF1EC;
  --ink:#14302B; --ink2:#445E56; --ink3:#728880; --ink4:#A3B8B0;
  --teal:#1B6B5F; --teal-d:#114840; --teal-soft:#DFF0EB; --teal-mid:#A8D4CC;
  --clay:#B85E35; --clay-soft:#F5E3D8; --clay-mid:#D9956A;
  --rose:#A03228; --rose-soft:#F2DDD9;
  --amber:#8F6610; --amber-soft:#F2E6C8;
  --line:#D8E2DE; --line2:#E8EEEB;
  --cool:#EDF0F4; --cool-line:#D4DBE2;
  --r-sm:10px; --r-md:14px; --r-lg:20px; --r-xl:28px;
  --shadow-sm:0 2px 8px -4px rgba(20,48,43,.18);
  --shadow-md:0 8px 24px -12px rgba(20,48,43,.28);
  --shadow-lg:0 20px 48px -20px rgba(20,48,43,.38);
}

/* ── APP SHELL ── */
.app{font-family:'Inter',system-ui,sans-serif;color:var(--ink);background:var(--bg);min-height:100vh;padding-bottom:48px;-webkit-font-smoothing:antialiased}
.app button:focus-visible,.app textarea:focus-visible,.app input:focus-visible{outline:2px solid var(--teal);outline-offset:2px;border-radius:var(--r-sm)}

/* ── TOP BAR ── */
.topbar{display:flex;align-items:center;gap:16px;padding:14px 22px;background:var(--surface);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:10;flex-wrap:wrap}
.topbar-brand{display:flex;flex-direction:column;margin-right:auto;line-height:1.15}
.brand-logo{font-family:'Instrument Serif',Georgia,serif;font-size:22px;color:var(--teal-d);letter-spacing:-.01em}
.brand-sub{font-size:11px;font-weight:600;color:var(--ink3);letter-spacing:.04em;text-transform:uppercase;margin-top:1px}
/* 3-way role toggle */
.roletoggle{position:relative;display:flex;background:var(--surface2);border:1px solid var(--line);border-radius:999px;padding:3px}
.role-slider{position:absolute;top:3px;bottom:3px;left:3px;width:calc(33.333% - 2px);background:var(--teal);border-radius:999px;box-shadow:0 2px 6px rgba(17,72,64,.3);transition:transform .35s cubic-bezier(.34,1.45,.5,1)}
.roletoggle.role-clinician .role-slider{transform:translateX(100%)}
.roletoggle.role-coordinator .role-slider{transform:translateX(200%)}
.rolebtn{position:relative;z-index:1;display:flex;align-items:center;justify-content:center;gap:5px;border:none;background:transparent;color:var(--ink2);font:inherit;font-size:12.5px;font-weight:600;padding:8px 14px;border-radius:999px;cursor:pointer;transition:color .25s;white-space:nowrap}
.rolebtn.on{color:#fff}
.rolebtn.on svg{animation:hh-settle .38s ease}
.rolebtn:not(.on):hover{color:var(--teal-d)}
.topbar-right{display:flex;align-items:center;gap:10px}
.notif-dot{background:var(--rose);color:#fff;font-size:11px;font-weight:700;width:20px;height:20px;border-radius:99px;display:flex;align-items:center;justify-content:center}
.reset-btn{display:flex;align-items:center;gap:5px;border:1px solid var(--line);background:var(--surface);color:var(--ink2);font:inherit;font-size:12px;font-weight:600;padding:7px 12px;border-radius:9px;cursor:pointer;transition:border-color .15s,color .15s}
.reset-btn:hover{border-color:var(--ink3);color:var(--ink)}
.reset-btn:hover svg{animation:hh-spin .55s ease}

/* ── RIBBON ── */
.ribbon{background:var(--amber-soft);color:#6b4d0c;font-size:11px;font-weight:500;text-align:center;padding:6px 18px;border-bottom:1px solid #dbc990}

/* ── HINT BAR ── */
.hintbar{max-width:980px;margin:16px auto 0;display:flex;align-items:center;gap:8px;background:var(--teal-soft);color:var(--teal-d);font-size:13px;font-weight:500;padding:10px 14px;border-radius:11px;border:1px solid var(--teal-mid)}

/* ── STAGE ── */
.stage{max-width:980px;margin:0 auto;padding:24px 18px 0;display:flex;align-items:flex-start;gap:20px;justify-content:center}

/* ── PHONE ── */
.phone-wrap{display:flex;gap:18px;align-items:flex-start}
.phone{width:390px;flex-shrink:0;background:#0C2721;border-radius:48px;padding:12px;box-shadow:var(--shadow-lg),0 0 0 1px rgba(255,255,255,.06)}
.phone-notch{display:flex;align-items:center;justify-content:center;padding:4px 0 8px}
.phone-cam{width:12px;height:12px;border-radius:99px;background:#1a3830}
.phone-screen{background:var(--surface);border-radius:38px;overflow:hidden;min-height:680px}
.phone-home{width:120px;height:5px;background:#1a3830;border-radius:99px;margin:10px auto 4px}

/* ── SCREENS ── */
.screen{padding:26px 22px 28px;animation:hh-fade .32s ease}
.screen-welcome{display:flex;flex-direction:column;min-height:680px}
.screen-center{display:flex;flex-direction:column;align-items:center;padding-top:60px;min-height:680px}
.screen-plan{padding-bottom:20px}
.screen-progress{min-height:500px}
.mt-auto{margin-top:auto}
.mt-8{margin-top:8px}
.tc{text-align:center}

/* ── TYPOGRAPHY ── */
.eyebrow{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--teal);margin-bottom:4px}
.h-display{font-family:'Instrument Serif',Georgia,serif;font-size:30px;line-height:1.15;letter-spacing:-.01em;color:var(--ink);margin-bottom:12px}
.h-display em{font-style:italic;color:var(--teal)}
.h-screen{font-family:'Instrument Serif',Georgia,serif;font-size:22px;line-height:1.2;color:var(--ink);margin-bottom:6px}
.h-plan{font-family:'Instrument Serif',Georgia,serif;font-size:20px;line-height:1.2;color:var(--ink)}
.body-lead{font-size:14px;line-height:1.55;color:var(--ink2);margin-bottom:20px}
.muted{font-size:13px;color:var(--ink3);line-height:1.45;margin-bottom:12px}
.tiny{font-size:11.5px;margin-top:16px}
.screen-sub{font-size:13px;color:var(--ink3);margin-bottom:16px;line-height:1.4}

/* ── WELCOME LEAF ── */
.welcome-leaf{position:absolute;right:-10px;top:-10px;width:110px;opacity:.6;pointer-events:none}
.screen-welcome{position:relative;overflow:hidden}

/* ── TRUST LIST ── */
.trust-list{list-style:none;display:flex;flex-direction:column;gap:10px;margin-bottom:18px}
.trust-list li{display:flex;align-items:center;gap:9px;font-size:13px;font-weight:500;color:var(--ink);animation:hh-rise .5s ease backwards}
.trust-list li:nth-child(1){animation-delay:.06s}
.trust-list li:nth-child(2){animation-delay:.14s}
.trust-list li:nth-child(3){animation-delay:.22s}
.trust-list svg{color:var(--teal);flex-shrink:0}

/* ── CONSENT NOTE ── */
.consent-note{font-size:11px;color:var(--ink4);line-height:1.45;background:var(--surface2);border-radius:9px;padding:9px 11px;margin-bottom:14px}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;border:none;border-radius:12px;font:inherit;font-weight:600;font-size:14px;padding:13px 18px;cursor:pointer;transition:transform .1s,background .15s,box-shadow .15s}
.btn:active{transform:translateY(1px)!important}
.btn-primary{background:var(--teal);color:#fff}
.btn-primary:hover{background:var(--teal-d);transform:translateY(-1px);box-shadow:0 8px 20px -8px rgba(17,72,64,.5)}
.btn-primary:disabled{background:#a8bfba;cursor:not-allowed;transform:none!important;box-shadow:none}
.btn-ghost{background:var(--surface);color:var(--ink);border:1px solid var(--line)}
.btn-ghost:hover{border-color:var(--ink3);transform:translateY(-1px)}
.btn-rose{background:var(--rose);color:#fff;font-size:12.5px;padding:9px 14px;border-radius:9px}
.btn-rose:hover{background:#7d251d;transform:translateY(-1px)}
.btn-sm{font-size:13px;padding:9px 14px}
.btn-block{width:100%}
.btn-arrow{transition:transform .18s}
.btn-primary:hover .btn-arrow{transform:translateX(3px)}

/* ── STEP DOTS ── */
.step-dots{display:flex;gap:0;margin-bottom:20px;border-bottom:1px solid var(--line);padding-bottom:14px}
.step-dot-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.step-dot{width:8px;height:8px;border-radius:99px;background:var(--line);transition:background .25s,transform .25s;display:block}
.step-dot-wrap.on .step-dot{background:var(--teal);transform:scale(1.3)}
.step-dot-wrap.done .step-dot{background:var(--teal-soft)}
.step-label{font-size:10px;font-weight:600;color:var(--ink4);letter-spacing:.04em;text-transform:uppercase;transition:color .25s}
.step-dot-wrap.on .step-label{color:var(--teal)}
.step-dot-wrap.done .step-label{color:var(--teal-mid)}

/* ── SYMPTOM CARDS ── */
.sym-list{display:flex;flex-direction:column;gap:9px;margin-bottom:8px}
.sym-card{border:1px solid var(--line);border-radius:var(--r-md);overflow:hidden;background:var(--surface);transition:border-color .2s,background .2s,box-shadow .2s}
.sym-card.on{border-color:var(--teal);background:var(--teal-soft);box-shadow:0 4px 14px -10px rgba(27,107,95,.45)}
.sym-head{width:100%;display:flex;align-items:center;gap:10px;background:transparent;border:none;font:inherit;padding:12px 13px;cursor:pointer;text-align:left}
.sym-icon{width:28px;height:28px;border-radius:8px;background:var(--surface2);display:flex;align-items:center;justify-content:center;color:var(--teal);flex-shrink:0;transition:background .2s,transform .2s}
.sym-card.on .sym-icon{background:#fff;transform:scale(1.06)}
.sym-label{flex:1;font-size:13.5px;font-weight:600}
.sym-check{width:20px;height:20px;border-radius:99px;border:1.5px solid var(--line);display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0;transition:background .2s,border-color .2s}
.sym-check.on{background:var(--teal);border-color:var(--teal)}
.sym-check.on svg{animation:hh-pop .3s cubic-bezier(.34,1.56,.64,1)}
.sev-row{display:flex;gap:5px;padding:0 13px 11px}
.seg-row{display:flex;gap:5px}
.sev-btn{flex:1;border:1px solid var(--line);background:#fff;color:var(--ink2);font:inherit;font-size:12px;font-weight:600;padding:8px 5px;border-radius:9px;cursor:pointer;transition:background .15s,color .15s,border-color .15s,transform .1s;white-space:nowrap}
.sev-btn:hover{border-color:var(--teal)}
.sev-btn.on{background:var(--teal);color:#fff;border-color:var(--teal)}
.sev-btn:active{transform:scale(.95)}

/* ── GOALS ── */
.goals-list{display:flex;flex-direction:column;gap:9px}
.goal-card{display:flex;align-items:center;gap:11px;border:1px solid var(--line);background:var(--surface);border-radius:var(--r-md);padding:13px;font:inherit;cursor:pointer;text-align:left;transition:transform .15s,border-color .2s,background .2s,box-shadow .2s}
.goal-card:hover{transform:translateY(-2px);border-color:var(--teal);box-shadow:var(--shadow-sm)}
.goal-card.on{border-color:var(--teal);background:var(--teal-soft)}
.goal-dot{width:9px;height:9px;border-radius:99px;background:var(--line);flex-shrink:0;transition:background .2s,transform .2s}
.goal-card.on .goal-dot{background:var(--teal);transform:scale(1.35)}
.goal-text{flex:1;display:flex;flex-direction:column;gap:2px}
.goal-label{font-size:13.5px;font-weight:600;color:var(--ink)}
.goal-desc{font-size:11.5px;color:var(--ink3)}
.goal-check{color:var(--teal);animation:hh-pop .3s cubic-bezier(.34,1.56,.64,1)}

/* ── FIELDS ── */
.field{margin-bottom:16px}
.field-label{display:block;font-size:12.5px;font-weight:600;color:var(--ink);margin-bottom:7px}
.chip-wrap{display:flex;flex-wrap:wrap;gap:7px}
.chip{border:1px solid var(--line);background:#fff;color:var(--ink2);font:inherit;font-size:12px;font-weight:600;padding:7px 13px;border-radius:99px;cursor:pointer;transition:background .15s,color .15s,border-color .15s,transform .1s}
.chip:hover{border-color:var(--teal)}
.chip.on{background:var(--teal);color:#fff;border-color:var(--teal)}
.chip:active{transform:scale(.95)}
.textarea{width:100%;border:1px solid var(--line);border-radius:var(--r-sm);padding:10px 12px;font:inherit;font-size:13px;color:var(--ink);resize:none;background:var(--surface2);transition:border-color .15s}
.textarea:focus{border-color:var(--teal);outline:none}

/* ── INTAKE NAV ── */
.intake-nav{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-top:20px}
.intake-nav .btn-primary{margin-left:auto}

/* ── REVIEW CARD ── */
.review-card{background:var(--surface2);border:1px solid var(--line);border-radius:var(--r-md);overflow:hidden;margin-bottom:14px}
.review-row{display:flex;gap:10px;padding:10px 13px;border-bottom:1px solid var(--line2);font-size:13px}
.review-row:last-child{border-bottom:none}
.review-key{font-weight:600;color:var(--ink2);width:100px;flex-shrink:0}
.review-val{color:var(--ink);flex:1}

/* ── FLAG NOTE ── */
.flag-note{display:flex;align-items:center;gap:7px;background:var(--rose-soft);border:1px solid #e8c8c4;border-radius:10px;padding:10px 12px;font-size:12.5px;color:#7a2b22;margin-top:6px}
.flag-note svg{flex-shrink:0;color:var(--rose)}

/* ── DRAFTING ── */
.orbit-ring{width:72px;height:72px;border-radius:99px;background:var(--teal-soft);display:flex;align-items:center;justify-content:center;margin-bottom:20px;animation:hh-pulse 1.8s ease-in-out infinite;position:relative}
.orbit-core{color:var(--teal);display:flex;align-items:center;justify-content:center}
.draft-lines{display:flex;flex-direction:column;gap:12px;margin:16px 0 6px;width:88%}
.draft-line{display:flex;align-items:center;gap:10px;font-size:13px;font-weight:500;color:var(--ink4);opacity:.5;transition:.35s}
.draft-line.on{opacity:1;color:var(--ink)}
.draft-ic{width:18px;height:18px;display:flex;align-items:center;justify-content:center;color:var(--teal);flex-shrink:0}
.spin-dot{width:12px;height:12px;border-radius:99px;border:2px solid var(--teal-soft);display:block}
.spin-dot.active{border-top-color:var(--teal);animation:hh-spin .7s linear infinite}

/* ── PENDING ── */
.pend-mark{width:64px;height:64px;border-radius:99px;background:var(--teal-soft);color:var(--teal-d);display:flex;align-items:center;justify-content:center;margin-bottom:18px;animation:hh-pulse 2s ease-in-out infinite}
.escalation-note{display:flex;align-items:flex-start;gap:9px;background:var(--clay-soft);border:1px solid #ddb99a;border-radius:12px;padding:12px 13px;font-size:13px;line-height:1.45;color:#7a3e22;margin-top:16px}
.escalation-note svg{flex-shrink:0;color:var(--clay);margin-top:1px}
.sla-badge{display:inline-flex;align-items:center;gap:5px;background:var(--surface2);border:1px solid var(--line);border-radius:99px;padding:6px 12px;font-size:11px;font-weight:600;color:var(--ink3);margin-top:18px}

/* ── PLAN VIEW ── */
.plan-header{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:16px}
.milestone-banner{display:flex;align-items:center;gap:8px;background:var(--teal);color:#fff;border-radius:11px;padding:10px 13px;font-size:12.5px;font-weight:600;margin-bottom:14px;animation:hh-fade .3s ease}
.milestone-close{background:transparent;border:none;color:#fff;cursor:pointer;margin-left:auto;display:flex;opacity:.7}
.replan-banner{display:flex;align-items:center;gap:8px;background:var(--clay-soft);color:var(--clay);border:1px solid #d9a07a;border-radius:11px;padding:10px 13px;font-size:12.5px;font-weight:600;margin-bottom:14px}

/* ── PROGRESS RING ── */
.progress-ring{display:block;flex-shrink:0}
.ring-label{font-size:11.5px;font-weight:700;fill:var(--teal-d)}

/* ── THIS WEEK CARD ── */
.this-week-card{position:relative;overflow:hidden;background:var(--ink);color:#fff;border-radius:var(--r-lg);padding:18px 18px 16px;margin-bottom:18px;animation:hh-rise .45s ease}
.this-week-card::after{content:'';position:absolute;inset:0;background:radial-gradient(140% 80% at 108% -8%, rgba(159,210,200,.22),transparent 60%);pointer-events:none}
.this-week-card>*{position:relative;z-index:1}
.tw-eyebrow{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#87c8bf;margin-bottom:6px}
.tw-title{font-family:'Instrument Serif',Georgia,serif;font-size:18px;font-weight:400;margin-bottom:5px;line-height:1.2}
.tw-action{font-size:13px;line-height:1.45;color:#cae0db;margin-bottom:10px}
.tw-actions-row{display:flex;gap:7px;flex-wrap:wrap;margin-top:10px}
.task-chip{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,.1);color:#cae0db;border:1px solid rgba(255,255,255,.15);border-radius:99px;font:inherit;font-size:11px;font-weight:600;padding:5px 10px;cursor:pointer;transition:background .15s}
.task-chip.done{background:var(--teal);color:#fff;border-color:var(--teal)}
.task-dot{width:7px;height:7px;border-radius:99px;background:rgba(255,255,255,.35);flex-shrink:0}

/* ── PHASE / REC CARDS ── */
.phase-block{margin-bottom:16px}
.phase-label{font-size:10.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--ink3);padding-bottom:7px;margin-bottom:9px;border-bottom:1px solid var(--line)}
.rec-card{border:1px solid var(--line);border-radius:var(--r-md);padding:12px 13px;margin-bottom:8px;background:var(--surface);animation:hh-rise .4s ease backwards;transition:transform .15s,border-color .18s,box-shadow .18s}
.rec-card:hover{transform:translateY(-2px);border-color:var(--teal);box-shadow:var(--shadow-sm)}
.rec-card.referral{background:var(--surface2);border-style:dashed}
.rec-card.safety{background:var(--rose-soft);border-color:#dec9c6}
.rec-card.safety:hover{border-color:var(--rose)}
.rec-head{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.rec-icon{width:26px;height:26px;border-radius:7px;background:var(--teal-soft);color:var(--teal-d);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.rec-card.safety .rec-icon{background:#fff;color:var(--rose)}
.rec-title{font-size:13.5px;font-weight:600;flex:1}
.cadence-pill{font-size:10.5px;font-weight:600;color:var(--ink3);background:var(--surface2);padding:3px 8px;border-radius:99px;white-space:nowrap}
.rec-card.referral .cadence-pill,.rec-card.safety .cadence-pill{background:#fff}
.rec-body{font-size:12.5px;line-height:1.45;color:var(--ink2)}
.plan-foot{display:flex;gap:9px;margin-top:14px;padding-top:12px;border-top:1px solid var(--line)}

/* ── EVIDENCE TOGGLE — the trust signature ── */
.ev-wrap{margin-top:8px}
.ev-btn{display:inline-flex;align-items:center;gap:5px;background:transparent;border:none;color:var(--teal);font:inherit;font-size:12px;font-weight:700;cursor:pointer;padding:2px 0;transition:gap .15s}
.ev-btn:hover{gap:8px}
.ev-wrap.light .ev-btn{color:#87c8bf}
.ev-chev{transition:transform .22s}
.ev-chev.open{transform:rotate(180deg)}
.ev-panel{margin-top:9px;border-left:2.5px solid var(--teal);padding:10px 0 2px 12px;animation:hh-evopen .25s ease}
.ev-wrap.light .ev-panel{border-color:#4a9a8f}
.ev-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:6px}
.ev-badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px;letter-spacing:.02em}
.ev-guideline{background:var(--teal-soft);color:var(--teal-d)}
.ev-good{background:#e6eef4;color:#2e5268}
.ev-referral{background:var(--clay-soft);color:#7a3e22}
.ev-safety{background:var(--rose-soft);color:var(--rose)}
.ev-src{font-size:10.5px;font-weight:600;color:var(--ink3)}
.ev-wrap.light .ev-src{color:#87c8bf}
.ev-rationale{font-size:12px;line-height:1.5;color:var(--ink2);margin-bottom:7px}
.ev-wrap.light .ev-rationale{color:#cae0db}

// 0.2 Rules engine (US-1.C2) — Spine C
function assemblePlan(intake) {
  const flags = {
    skin: !!intake.symptoms.skinhair,
    metabolic: !!intake.symptoms.weight || intake.primaryGoal==="metabolic" || intake.conditions.includes("Insulin resistance") || intake.conditions.includes("Type-2 diabetes"),
    fertility: intake.primaryGoal==="fertility",
  };
  const moodMarked = intake.symptoms.mood?.sev==="Marked";
  const chosen = MODULE_LIBRARY.filter(m => {
    if (m.always) return true;
    if (!m.when) return false;
    return (m.when.symptoms||[]).some(s=>intake.symptoms[s]) ||
           (m.when.primary_goal||[]).includes(intake.primaryGoal) ||
           (m.when.conditions||[]).some(c=>intake.conditions.includes(c));
  });
  const goalBoost = m =>
    (intake.primaryGoal==="fertility"&&m.id==="fertility")||(intake.primaryGoal==="cycle"&&m.id==="track")||
    (intake.primaryGoal==="metabolic"&&(m.id==="move"||m.id==="metabolic-screen"))||(intake.primaryGoal==="skin"&&m.id==="skin")||
    (intake.primaryGoal==="mood"&&(m.id==="wellbeing"||m.id==="mood-screen")) ? 0 : 1;
  const ordered = [...chosen].sort((a,b)=>a.phase-b.phase||goalBoost(a)-goalBoost(b));
  // build week-1 actions
  const week1 = ordered.filter(m=>m.kind==="self").slice(0,3).map((m,i)=>({ id:m.id+"_w1", moduleId:m.id, week:1, title:m.title, status:"pending", primary: i===0 }));
  return { modules:ordered, week1Actions:week1, escalation:moodMarked, primaryGoal:intake.primaryGoal, version:1, status:PLAN_STATES.DRAFT };
}

// Red-flag rules (US-4.C1)
function checkRedFlags(input) {
  const flags = [];
  if (input.symptoms?.mood?.sev==="Marked") flags.push({ trigger:"marked_low_mood", severity:"high", msg:"You mentioned you've been feeling quite low. A care companion will check in with you." });
  if (input.symptoms?.cycle?.sev==="Marked") flags.push({ trigger:"marked_cycle_disturbance", severity:"medium", msg:"Significant cycle changes noted — flagged for your clinician." });
  return flags;
}

// Check-in milestone detection (US-3.C3)
function detectMilestone(checkins) {
  if (checkins.length===1) return { hit:true, msg:"First check-in complete — your plan is now adapting to you. Keep it up." };
  if (checkins.length===4) return { hit:true, msg:"4 weeks in — you've built a real tracking habit. Your clinician will review your progress soon." };
  return { hit:false };
}

// Re-plan trigger (US-7.C1)
function shouldReplan(checkins) {
  const weeks = checkins.length;
  return weeks>0 && (weeks%4===0);
}

/* ═══════════════════════════════════════════════════════
   INTAKE CONTENT
═══════════════════════════════════════════════════════ */
const SYMPTOMS_LIST = [
  { key:"cycle", label:"Irregular or missed periods", icon:"calendar" },
  { key:"skinhair", label:"Acne, skin changes or unwanted hair", icon:"sparkles" },
  { key:"weight", label:"Weight or energy changes", icon:"activity" },
  { key:"mood", label:"Low mood, anxiety or stress", icon:"brain" },
];
const GOALS_LIST = [
  { key:"cycle", label:"More regular cycles", desc:"Track and stabilise your period pattern" },
  { key:"fertility", label:"Trying to conceive", desc:"Prepare your body and the conversation" },
  { key:"metabolic", label:"Weight & metabolic health", desc:"Improve energy, insulin, and movement" },
  { key:"skin", label:"Skin & hair", desc:"Manage acne and hair concerns" },
  { key:"mood", label:"Mood & energy", desc:"Support mental health and vitality" },
];
const CONDITIONS_LIST = ["Thyroid condition","Insulin resistance","Type-2 diabetes","None of these"];
const SEV = ["Mild","Moderate","Marked"];
const PHASE_LABELS = { 1:"Days 1–30 · Foundations", 2:"Days 31–60 · Build", 3:"Days 61–90 · Consolidate" };
const DRAFT_SEQ = ["Matching your goals to the evidence library\u2026","Selecting care modules for your profile\u2026","Assembling your personalised 90-day plan\u2026"];
const WEEK_LABELS = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];

/* ═══════════════════════════════════════════════════════
   ROOT APP
═══════════════════════════════════════════════════════ */
function App() {
  const [role, setRole] = useState("member");
  // member state
  const [memberStep, setMemberStep] = useState("welcome"); // welcome|intake|drafting|pending|plan|checkin|progress|replan
  const [iStep, setIStep] = useState(0);
  const [intake, setIntake] = useState({ symptoms:{}, primaryGoal:null, diagnosed:null, conditions:[], meds:[], note:"" });
  const [plan, setPlan] = useState(null);
  const [planStatus, setPlanStatus] = useState(PLAN_STATES.DRAFT);
  const [checkins, setCheckins] = useState([]);
  const [completedActions, setCompletedActions] = useState({});
  const [openEvidence, setOpenEvidence] = useState({});
  const [notifications, setNotifications] = useState([]);
  const [replanPending, setReplanPending] = useState(false);
  const [milestone, setMilestone] = useState(null);
  // clinician state
  const [clinApproved, setClinApproved] = useState({});
  const [clinRemoved, setClinRemoved] = useState({});
  const [clinAck, setClinAck] = useState(false);
  const [slaStart] = useState(Date.now());
  // coordinator state
  const [coordHandled, setCoordHandled] = useState({});
  const [coordNote, setCoordNote] = useState("");
  // audit
  const auditRef = useRef([]);
  const timers = useRef([]);
  useEffect(()=>()=>timers.current.forEach(clearTimeout),[]);

  function addNotif(msg, type="info") { setNotifications(n=>[{ id:Date.now(), msg, type },...n.slice(0,4)]); }

  function startDraft() {
    const p = assemblePlan(intake);
    const redFlags = checkRedFlags(intake);
    setPlan({ ...p, redFlags });
    setPlanStatus(PLAN_STATES.PENDING);
    auditRef.current = auditLog(auditRef.current, "plan_state_change", { from:"draft", to:"pending_review" });
    setMemberStep("drafting");
    timers.current.push(setTimeout(()=>setMemberStep("pending"), 2800));
    addNotif("Your plan is now with Dr. Rao for review.","info");
  }

  function approvePlan() {
    setPlanStatus(PLAN_STATES.PUBLISHED);
    auditRef.current = auditLog(auditRef.current, "plan_state_change", { from:"approved", to:"published", by:"Dr. Rao" });
    setMemberStep("plan");
    addNotif("Plan approved and released to Priya.","success");
  }

  function submitCheckin(data) {
    const newCheckins = [...checkins, { ...data, week: checkins.length+1, ts: new Date().toISOString() }];
    setCheckins(newCheckins);
    auditRef.current = auditLog(auditRef.current, "checkin_submitted", { week: newCheckins.length });
    const m = detectMilestone(newCheckins);
    if (m.hit) setMilestone(m.msg);
    const replan = shouldReplan(newCheckins);
    if (replan) { setReplanPending(true); addNotif("Time for your plan check-in — a re-plan has been drafted for review.","info"); }
    const flags = checkRedFlags({ symptoms: { mood: { sev: data.mood } } });
    if (flags.length) { addNotif(flags[0].msg,"alert"); }
    addNotif("Check-in saved. Great job staying consistent.","success");
    setMemberStep("plan");
  }

  function reset() {
    setRole("member"); setMemberStep("welcome"); setIStep(0);
    setIntake({ symptoms:{}, primaryGoal:null, diagnosed:null, conditions:[], meds:[], note:"" });
    setPlan(null); setPlanStatus(PLAN_STATES.DRAFT); setCheckins([]); setCompletedActions({});
    setOpenEvidence({}); setNotifications([]); setReplanPending(false); setMilestone(null);
    setClinApproved({}); setClinRemoved({}); setClinAck(false); setCoordHandled({}); setCoordNote("");
    auditRef.current = [];
  }

  // Reset coordinator "handled" flags when new check-ins arrive
  // so fresh check-in items always appear as open, not pre-handled
  useEffect(() => {
    if (checkins.length > 0) {
      setCoordHandled(prev => {
        const next = {};
        // keep escalation/milestone flags; clear per-checkin handled flags
        // so new check-ins always surface as open
        if (prev["escalation"]) next["escalation"] = true;
        if (prev["milestone-4"]) next["milestone-4"] = true;
        // keep first-checkin ack only if it was explicitly acknowledged AFTER checkin arrived
        if (prev["first-checkin"] && checkins.length > 0) next["first-checkin"] = true;
        // carry forward per-checkin acks that still match current checkins
        checkins.forEach((_, i) => {
          const key = "checkin-w"+(i+2);
          if (prev[key]) next[key] = true;
        });
        return next;
      });
    }
  }, [checkins.length]);

  const sharedProps = { plan, planStatus, checkins, completedActions, setCompletedActions, openEvidence, setOpenEvidence, notifications, setNotifications, milestone, setMilestone, replanPending, setReplanPending };

  return (
    <div className="app">
      <style>{CSS_STYLES}</style>
      <TopBar role={role} setRole={setRole} onReset={reset} notifications={notifications} />
      <div className="ribbon">Prototype · content modelled on {SRC} · illustrative · not medical advice</div>
      <HintBar role={role} step={memberStep} status={planStatus} escalation={plan?.escalation} replan={replanPending} />

      <main className="stage">
        {role==="member" && (
          <div className="phone-wrap">
            <PhoneFrame>
              {memberStep==="welcome" && <Welcome onStart={()=>setMemberStep("intake")} />}
              {memberStep==="intake" && <Intake iStep={iStep} setIStep={setIStep} intake={intake} setIntake={setIntake} onSubmit={startDraft} />}
              {memberStep==="drafting" && <Drafting seq={DRAFT_SEQ} />}
              {memberStep==="pending" && <Pending escalation={plan?.escalation} />}
              {memberStep==="plan" && <PlanView {...sharedProps} onCheckin={()=>setMemberStep("checkin")} onProgress={()=>setMemberStep("progress")} />}
              {memberStep==="checkin" && <CheckinView checkins={checkins} onSubmit={submitCheckin} onBack={()=>setMemberStep("plan")} />}
              {memberStep==="progress" && <ProgressView checkins={checkins} plan={plan} onBack={()=>setMemberStep("plan")} />}
            </PhoneFrame>
            <NudgePanel notifications={notifications} step={memberStep} checkins={checkins} />
          </div>
        )}
        {role==="clinician" && (
          <ClinicianConsole plan={plan} planStatus={planStatus} onApprove={approvePlan}
            clinRemoved={clinRemoved} setClinRemoved={setClinRemoved}
            clinApproved={clinApproved} setClinApproved={setClinApproved}
            clinAck={clinAck} setClinAck={setClinAck} slaStart={slaStart} auditLog={auditRef.current} />
        )}
        {role==="coordinator" && (
          <CoordinatorConsole plan={plan} planStatus={planStatus} checkins={checkins}
            coordHandled={coordHandled} setCoordHandled={setCoordHandled}
            coordNote={coordNote} setCoordNote={setCoordNote}
            escalation={plan?.escalation} notifications={notifications} />
        )}
      </main>
    </div>
  );
}

/* ═══ TOP BAR ═══ */
function TopBar({ role, setRole, onReset, notifications }) {
  const ROLES = [{ k:"member", label:"Member", icon:"user" }, { k:"clinician", label:"Clinician", icon:"stethoscope" }, { k:"coordinator", label:"Coordinator", icon:"users" }];
  const idx = ROLES.findIndex(r=>r.k===role);
  const unread = notifications.filter(n=>n.type==="alert").length;
  return (
    <header className="topbar">
      <div className="topbar-brand">
        <span className="brand-logo">Humm</span>
        <span className="brand-sub">Her Health Hub · PCOS V1</span>
      </div>
      <div className={"roletoggle role-"+role} >
        <span className="role-slider" />
        {ROLES.map(r=>(
          <button key={r.k} className={"rolebtn"+(role===r.k?" on":"")} onClick={()=>setRole(r.k)}>
            <Ic n={r.icon} size={14} />{r.label}
          </button>
        ))}
      </div>
      <div className="topbar-right">
        {unread>0 && <span className="notif-dot">{unread}</span>}
        <button className="reset-btn" onClick={onReset}><Ic n="rotate" size={13} /> Restart</button>
      </div>
    </header>
  );
}

/* ═══ HINT BAR ═══ */
function HintBar({ role, step, status, escalation, replan }) {
  let msg=null;
  if (role==="member"&&step==="welcome") msg="Start the intake to build your personalised plan.";
  else if (role==="member"&&step==="pending") msg="Switch to Clinician tab → approve the plan → come back to see it.";
  else if (role==="member"&&step==="plan"&&status===PLAN_STATES.PUBLISHED) msg="Plan live. Try a check-in, explore evidence cards, or check your progress.";
  else if (role==="clinician"&&status===PLAN_STATES.PENDING) msg=escalation?"Wellbeing flag present — acknowledge before releasing.":"Review each recommendation then approve to release.";
  else if (role==="clinician"&&status===PLAN_STATES.PUBLISHED) msg="Plan released. Switch to Member to see the live view.";
  else if (role==="coordinator"&&status===PLAN_STATES.DRAFT) msg="Complete the member intake first.";
  else if (role==="coordinator") msg="Coordinator console — triage the queue, message members, handle escalations.";
  if (replan&&role==="member") msg="A plan update is ready — switch to Clinician to review and release.";
  if (!msg) return null;
  return <div className="hintbar"><Ic n="arrow-right" size={13} />{msg}</div>;
}

/* ═══ PHONE FRAME ═══ */
function PhoneFrame({ children }) {
  return (
    <div className="phone">
      <div className="phone-notch"><div className="phone-cam"/></div>
      <div className="phone-screen">{children}</div>
      <div className="phone-home"/>
    </div>
  );
}

/* ═══════════════════ MEMBER SCREENS ═══════════════════ */

/* WELCOME — US-1.C1 screen 1 */
function Welcome({ onStart }) {
  return (
    <div className="screen screen-welcome">
      <div className="welcome-leaf" aria-hidden="true">
        <svg viewBox="0 0 120 160" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M60 10 C10 40 5 100 60 150 C115 100 110 40 60 10z" fill="var(--teal-soft)" opacity=".7"/>
          <path d="M60 10 C60 10 60 80 60 150" stroke="var(--teal)" strokeWidth="1.5" strokeDasharray="4 4"/>
        </svg>
      </div>
      <div className="eyebrow">Her Health Hub</div>
      <h1 className="h-display">Your PCOS, <em>guided.</em></h1>
      <p className="body-lead">A personalised 90-day plan built from clinical evidence, reviewed by a doctor before it reaches you.</p>
      <ul className="trust-list">
        <li><Ic n="shield" size={14}/> Clinician-reviewed before you see it</li>
        <li><Ic n="book" size={14}/> Every step shows its evidence</li>
        <li><Ic n="clock" size={14}/> Under 3 minutes to set up</li>
      </ul>
      <div className="consent-note">By continuing you consent to Humm storing your health data per our privacy policy. You can withdraw at any time.</div>
      <button className="btn btn-primary btn-block mt-auto" onClick={onStart}>Get started <Ic n="arrow-right" size={16} cls="btn-arrow"/></button>
    </div>
  );
}

/* INTAKE — US-1.C1 screens 2–6 */
function Intake({ iStep, setIStep, intake, setIntake, onSubmit }) {
  const STEPS = ["Symptoms","Goals","History","Review"];
  const set = p => setIntake(s=>({...s,...p}));
  const toggleSym = k => setIntake(s=>{ const sy={...s.symptoms}; if(sy[k]) delete sy[k]; else sy[k]={sev:"Mild"}; return{...s,symptoms:sy}; });
  const setSev = (k,v) => setIntake(s=>({...s,symptoms:{...s.symptoms,[k]:{sev:v}}}));
  const toggleCond = c => setIntake(s=>{ let a=s.conditions.includes(c)?s.conditions.filter(x=>x!==c):[...s.conditions,c]; if(c==="None of these") a=s.conditions.includes(c)?[]:["None of these"]; else a=a.filter(x=>x!=="None of these"); return{...s,conditions:a}; });
  const canNext = (iStep===0&&Object.keys(intake.symptoms).length>0)||(iStep===1&&intake.primaryGoal)||iStep>=2;
  const redFlags = checkRedFlags(intake);

  return (
    <div className="screen">
      <StepDots n={STEPS.length} i={iStep} labels={STEPS}/>
      {iStep===0&&(<>
        <h2 className="h-screen">What's been bothering you?</h2>
        <p className="screen-sub">Select all that apply, then set how much each affects you.</p>
        <div className="sym-list">
          {SYMPTOMS_LIST.map(s=>{
            const on=!!intake.symptoms[s.key];
            return (<div key={s.key} className={"sym-card"+(on?" on":"")}>
              <button className="sym-head" onClick={()=>toggleSym(s.key)}>
                <span className="sym-icon"><Ic n={s.icon} size={16}/></span>
                <span className="sym-label">{s.label}</span>
                <span className={"sym-check"+(on?" on":"")}>{on&&<Ic n="check" size={12}/>}</span>
              </button>
              {on&&<div className="sev-row">{SEV.map(v=><button key={v} className={"sev-btn"+(intake.symptoms[s.key].sev===v?" on":"")} onClick={()=>setSev(s.key,v)}>{v}</button>)}</div>}
            </div>);
          })}
        </div>
        {redFlags.length>0&&<div className="flag-note"><Ic n="alert" size={13}/> {redFlags[0].msg}</div>}
      </>)}

      {iStep===1&&(<>
        <h2 className="h-screen">What matters most right now?</h2>
        <p className="screen-sub">Your top goal shapes the first 30 days.</p>
        <div className="goals-list">
          {GOALS_LIST.map(g=>(
            <button key={g.key} className={"goal-card"+(intake.primaryGoal===g.key?" on":"")} onClick={()=>set({primaryGoal:g.key})}>
              <div className="goal-dot"/>
              <div className="goal-text"><span className="goal-label">{g.label}</span><span className="goal-desc">{g.desc}</span></div>
              {intake.primaryGoal===g.key&&<Ic n="check" size={15} cls="goal-check"/>}
            </button>
          ))}
        </div>
      </>)}

      {iStep===2&&(<>
        <h2 className="h-screen">A little context</h2>
        <p className="screen-sub">Optional — helps your clinician personalise safely.</p>
        <div className="field"><label className="field-label">Already diagnosed with PCOS?</label>
          <div className="seg-row">{["Yes","Not sure","No"].map(v=><button key={v} className={"sev-btn"+(intake.diagnosed===v?" on":"")} onClick={()=>set({diagnosed:v})}>{v}</button>)}</div>
        </div>
        <div className="field"><label className="field-label">Any related conditions?</label>
          <div className="chip-wrap">{CONDITIONS_LIST.map(c=><button key={c} className={"chip"+(intake.conditions.includes(c)?" on":"")} onClick={()=>toggleCond(c)}>{c}</button>)}</div>
        </div>
        <div className="field"><label className="field-label">Anything else your clinician should know?</label>
          <textarea className="textarea" rows={2} placeholder="Read by a human — not used to generate your plan." value={intake.note} onChange={e=>set({note:e.target.value})}/></div>
      </>)}

      {iStep===3&&(<>
        <h2 className="h-screen">Ready to build your plan</h2>
        <p className="screen-sub">Here's what we'll use:</p>
        <div className="review-card">
          <div className="review-row"><span className="review-key">Symptoms</span><span className="review-val">{Object.keys(intake.symptoms).map(k=>SYMPTOMS_LIST.find(s=>s.key===k)?.label).filter(Boolean).join(", ")||"—"}</span></div>
          <div className="review-row"><span className="review-key">Primary goal</span><span className="review-val">{GOALS_LIST.find(g=>g.key===intake.primaryGoal)?.label||"—"}</span></div>
          <div className="review-row"><span className="review-key">Diagnosed</span><span className="review-val">{intake.diagnosed||"—"}</span></div>
          <div className="review-row"><span className="review-key">Conditions</span><span className="review-val">{intake.conditions.join(", ")||"—"}</span></div>
        </div>
        <div className="consent-note mt-8">A clinician will review your plan before you see it. Every recommendation shows its evidence.</div>
      </>)}

      <div className="intake-nav">
        {iStep>0?<button className="btn btn-ghost" onClick={()=>setIStep(iStep-1)}>Back</button>:<span/>}
        {iStep<STEPS.length-1
          ?<button className="btn btn-primary" disabled={!canNext} onClick={()=>setIStep(iStep+1)}>Next <Ic n="arrow-right" size={14} cls="btn-arrow"/></button>
          :<button className="btn btn-primary" onClick={onSubmit}>Build my plan <Ic n="sparkles" size={14} cls="btn-arrow"/></button>}
      </div>
    </div>
  );
}

/* DRAFTING — US-1.C2 */
function Drafting({ seq }) {
  const [line, setLine] = useState(0);
  useEffect(()=>{ const t1=setTimeout(()=>setLine(1),800),t2=setTimeout(()=>setLine(2),1700); return()=>{clearTimeout(t1);clearTimeout(t2);}; },[]);
  return (
    <div className="screen screen-center">
      <div className="orbit-ring"><div className="orbit-core"><Ic n="sparkles" size={22}/></div></div>
      <h2 className="h-screen tc">Building your plan</h2>
      <div className="draft-lines">
        {seq.map((s,i)=>(
          <div key={i} className={"draft-line"+(i<=line?" on":"")}>
            <span className="draft-ic">{i<line?<Ic n="check" size={13}/>:<span className={"spin-dot"+(i===line?" active":"")}/>}</span>{s}
          </div>
        ))}
      </div>
      <p className="muted tc tiny">Rules engine selecting from the evidence library — not free-text generation.</p>

}

/* PLAN VIEW — US-2.C1 + US-2.C2 */
function PlanView({ plan, checkins, completedActions, setCompletedActions, openEvidence, setOpenEvidence, onCheckin, onProgress, milestone, setMilestone, replanPending }) {
  if (!plan) return null;
  const mods = plan.modules;
  const thisWeek = mods.find(m=>m.thisWeek)||mods[0];
  const weekAction = plan.week1Actions?.find(a=>a.primary);
  const toggleDone = id => setCompletedActions(s=>({...s,[id]:!s[id]}));
  const toggleEv = id => setOpenEvidence(s=>({...s,[id]:!s[id]}));
  const doneCount = plan.week1Actions?.filter(a=>completedActions[a.id]).length||0;
  const totalActions = plan.week1Actions?.length||0;
  const pct = totalActions?Math.round(doneCount/totalActions*100):0;

  return (
    <div className="screen screen-plan">
      {milestone&&<div className="milestone-banner"><Ic n="sparkles" size={14}/>{milestone}<button className="milestone-close" onClick={()=>setMilestone(null)}><Ic n="x" size={12}/></button></div>}
      {replanPending&&<div className="replan-banner"><Ic n="trending" size={14}/>A plan update is ready for clinician review.</div>}

      <div className="plan-header">
        <div><div className="eyebrow">90-day PCOS plan</div><h2 className="h-plan">Week {checkins.length+1} of 12</h2></div>
        <ProgressRing pct={pct} size={52}/>
      </div>

      {/* This Week — US-2.C1 */}
      <div className="this-week-card">
        <div className="tw-eyebrow">This week · primary action</div>
        <div className="tw-title">{thisWeek?.title}</div>
        <div className="tw-action">{thisWeek?.action}</div>
        <EvidenceToggle m={thisWeek} open={openEvidence} toggle={toggleEv} light/>
        <div className="tw-actions-row">
          {plan.week1Actions?.map(a=>(
            <button key={a.id} className={"task-chip"+(completedActions[a.id]?" done":"")} onClick={()=>toggleDone(a.id)}>
              {completedActions[a.id]?<Ic n="check" size={12}/>:<span className="task-dot"/>}
              {MODULE_LIBRARY.find(m=>m.id===a.moduleId)?.title?.split(" ").slice(0,3).join(" ")}
            </button>
          ))}
        </div>
      </div>

      {/* Phase breakdown */}
      {[1,2].map(p=>{
        const rows=mods.filter(m=>m.phase===p&&m.id!==thisWeek?.id);
        if(!rows.length) return null;
        return (
          <div key={p} className="phase-block">
            <div className="phase-label">{PHASE_LABELS[p]}</div>
            {rows.map((m,ri)=>(
              <div key={m.id} className={"rec-card"+(m.kind==="referral"?" referral":"")+(m.kind==="safety"?" safety":"")} style={{animationDelay:(ri*60)+"ms"}}>
                <div className="rec-head">
                  <span className="rec-icon"><Ic n={m.icon} size={14}/></span>
                  <span className="rec-title">{m.title}</span>
                  <span className="cadence-pill">{m.cadence}</span>
                </div>
                <div className="rec-body">{m.action}</div>
                <EvidenceToggle m={m} open={openEvidence} toggle={toggleEv}/>
              </div>
            ))}
          </div>
        );
      })}

      <div className="plan-foot">
        <button className="btn btn-ghost btn-sm" onClick={onProgress}><Ic n="trending" size={14}/>My progress</button>
        <button className="btn btn-primary btn-sm" onClick={onCheckin}><Ic n="calendar" size={14}/>Weekly check-in</button>
      </div>
    </div>
  );
}

/* EVIDENCE TOGGLE — the trust spine (US-1.C2 + Evidence contract) */
function EvidenceToggle({ m, open, toggle, light }) {
  if (!m?.evidence) return null;
  const isOpen = !!open[m.id];
  const lvl = m.evidence.level;
  return (
    <div className={"ev-wrap"+(light?" light":"")}>
      <button className="ev-btn" onClick={()=>toggle(m.id)} aria-expanded={isOpen}>
        Why this? <Ic n="chevron-down" size={13} cls={"ev-chev"+(isOpen?" open":"")}/>
      </button>
      {isOpen&&(
        <div className="ev-panel">
          <div className="ev-meta"><span className={"ev-badge ev-"+lvl}>{EV_LEVELS[lvl]}</span><span className="ev-src">{m.evidence.source}</span></div>
          <p className="ev-rationale">{m.evidence.rationale}</p>
          <div className="ev-reviewer"><Ic n="shield" size={11}/>Reviewed by {m.evidence.reviewed_by}</div>
        </div>
      )}

}

/* PROGRESS RING — US-3.C2 signature element */
function ProgressRing({ pct, size=64 }) {
  const r = (size-8)/2, circ = 2*Math.PI*r, dash = circ*(pct/100);
  return (
    <svg width={size} height={size} className="progress-ring">
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="var(--teal-soft)" strokeWidth="5"/>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="var(--teal)" strokeWidth="5"
        strokeDasharray={`${dash} ${circ}`} strokeLinecap="round" transform={`rotate(-90 ${size/2} ${size/2})`} style={{transition:"stroke-dasharray .6s ease"}}/>
      <text x={size/2} y={size/2+5} textAnchor="middle" className="ring-label">{pct}%</text>
    </svg>
  );
}

/* PROGRESS — US-3.C2 */
function ProgressView({ checkins, plan, onBack }) {
  const total = checkins.length;
  const moodMap = { Good:4, Okay:3, Low:2, Marked:1 };
  const moodScores = checkins.map((c,i)=>({ week:i+1, score:moodMap[c.mood]||2 }));
  const symScores = checkins.map((c,i)=>({ week:i+1, score:c.symptomSev?.top==="Mild"?3:c.symptomSev?.top==="Moderate"?2:c.symptomSev?.top==="Marked"?1:2 }));
  const adherence = checkins.length>0?Math.round((checkins.filter(c=>c.medsT).length/checkins.length)*100):0;
  return (
    <div className="screen screen-progress">
      <button className="back-btn" onClick={onBack}><Ic n="chevron-right" size={14} cls="back-ic"/>Back to plan</button>
      <div className="eyebrow">Your progress</div>
      <h2 className="h-screen">{total} week{total!==1?"s":""} in</h2>
      {total===0&&<div className="empty-state"><Ic n="trending" size={28}/><p>Complete your first check-in to start tracking progress.</p></div>}
      {total>0&&(<>
        <div className="metric-row">
          <MetricCard label="Check-ins done" value={total} unit="weeks" color="teal"/>
          <MetricCard label="Med adherence" value={adherence} unit="%" color="teal"/>

        </div>
        <div className="chart-block">
          <div className="chart-label">Mood trend (1=low, 4=good)</div>

        </div>

          <div className="chart-label">Symptom severity (1=marked, 3=mild)</div>

        </div>

function MetricCard({ label, value, unit, color }) {
  return <div className={"metric-card metric-"+color}><div className="metric-val">{value}<span className="metric-unit">{unit}</span></div><div className="metric-label">{label}</div></div>;
}

function MiniChart({ data, color, max }) {
  if (!data.length) return null;
  const W=220, H=60, pad=6;
  const xStep = data.length>1?(W-pad*2)/(data.length-1):0;
  const yScale = v => H-pad - (v/max)*(H-pad*2);
  const pts = data.map((d,i)=>({ x:pad+i*xStep, y:yScale(d.score) }));
  const path = pts.map((p,i)=>(i===0?`M${p.x},${p.y}`:`L${p.x},${p.y}`)).join(" ");
  return (
    <svg viewBox={`0 0 ${W} ${H}`} className="mini-chart">
      <polyline points={pts.map(p=>`${p.x},${p.y}`).join(" ")} fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
      {pts.map((p,i)=><circle key={i} cx={p.x} cy={p.y} r="3.5" fill={color}/>)}
      {data.map((d,i)=><text key={i} x={pad+i*xStep} y={H} textAnchor="middle" className="chart-label-sm">W{d.week}</text>)}
    </svg>
  );
}

function NudgePanel({ notifications, step, checkins }) {

    ...(checkins.length===0&&step==="plan"?[{ id:"n0", msg:"Complete your first check-in to start adapting your plan.", type:"tip" }]:[]),
    ...notifications.slice(0,3),
  ];
  if (!nudges.length) return null;
  return (
    <div className="nudge-panel">
      <div className="nudge-header"><Ic n="bell" size={14}/>Notifications</div>
      {nudges.map(n=>(
        <div key={n.id||n.msg} className={"nudge-item nudge-"+n.type}>
          <Ic n={n.type==="alert"?"alert":n.type==="success"?"check":"info"} size={13}/>
          <span>{n.msg}</span>
        </div>
      ))}
    </div>
  );
}

/* ═══════════════════ CLINICIAN CONSOLE — US-6 ═══════════════════ */
function ClinicianConsole({ plan, planStatus, onApprove, clinRemoved, setClinRemoved, clinApproved, setClinApproved, clinAck, setClinAck, slaStart, auditLog }) {
  const [tab, setTab] = useState("review");

    <div className="console-empty"><Ic n="clipboard" size={30}/><h2>No plans in queue</h2><p>Complete the member intake first.</p></div>
  );
  const modules = plan.modules.filter(m=>!clinRemoved[m.id]);
  const allAcked = !plan.escalation||clinAck;
  const canApprove = allAcked&&planStatus===PLAN_STATES.PENDING;

  return (
    <div className="console">
      <div className="console-head">
        <div>
          <div className="eyebrow">Clinician review queue</div>
          <h2 className="console-title">Priya S. · PCOS draft · v{plan.version}</h2>
          <div className="console-meta">
            Goal: <b>{GOALS_LIST.find(g=>g.key===plan.primaryGoal)?.label||"—"}</b> · {modules.length} recommendations
          </div>
        </div>
        <div className="console-right">
          <span className={"status-pill "+(planStatus===PLAN_STATES.PUBLISHED?"pill-ok":"pill-wait")}>

          </span>
          <div className={"sla-chip"+(slaOk?"":" sla-risk")}><Ic n="clock" size={11}/>{slaOk?`${elapsed}m / 24h`:"SLA at risk"}</div>
        </div>
      </div>

      {plan.escalation&&(
        <div className={"escalation-flag"+(clinAck?" acked":"")}>
          <Ic n="alert" size={16}/>
          <div className="flag-body"><b>Wellbeing flag</b> — Priya reported marked low mood. Guideline recommends screening and support before release.</div>
          {!clinAck?<button className="btn btn-rose" onClick={()=>setClinAck(true)}>Acknowledge & route to coordinator</button>

      <div className="console-tabs">
        {["review","audit"].map(t=><button key={t} className={"ctab"+(tab===t?" on":"")} onClick={()=>setTab(t)}>{t==="review"?"Plan review":"Audit log"}</button>)}
      </div>

      {tab==="review"&&(
        <div className="review-list">
          {plan.modules.map((m,i)=>{
            const off=!!clinRemoved[m.id];
            return (
              <div key={m.id} className={"rrec"+(off?" off":"")} style={{animationDelay:(i*40)+"ms"}}>
                <div className="rrec-icon"><Ic n={m.icon} size={14}/></div>
                <div className="rrec-main">
                  <div className="rrec-top">

                  <div className="rrec-action">{m.action}</div>
                  <div className="rrec-ev"><span className="ev-src">{m.evidence.source}</span> · {m.evidence.rationale}</div>
                </div>
                {planStatus!==PLAN_STATES.PUBLISHED&&(
                  <button className={"rrec-toggle"+(off?" restore":"")} onClick={()=>setClinRemoved(s=>({...s,[m.id]:!s[m.id]}))}>

        <div className="audit-list">

            <div key={i} className="audit-row">

/* ═══════════════════ COORDINATOR CONSOLE — US-5 ═══════════════════ */
function CoordinatorConsole({ plan, planStatus, checkins, coordHandled, setCoordHandled, coordNote, setCoordNote, escalation, notifications }) {
  const [activeTab, setActiveTab] = useState("queue");
  if (!plan) return <div className="console-empty"><Ic n="users" size={30}/><h2>No members in queue</h2><p>Complete the member intake first.</p></div>;

  // Full master list built independently of handled state
  // open/handled are then split from allItems — fixes the empty-handled bug
  const allItems = [
    // Escalation flag — always visible if raised
    ...(escalation ? [{ id:"escalation", priority:"high", label:"Wellbeing flag",
        desc:"Priya reported marked low mood — clinician has routed for follow-up.", action:"Reach out" }] : []),
    // First check-in slot — stays visible; switches label once done
    ...(planStatus===PLAN_STATES.PUBLISHED ? [{
        // id changes when checkin is done so pre-handled "due" never hides "received"
        id: checkins.length===0 ? "first-checkin-due" : "first-checkin-done",
        priority: checkins.length===0 ? "med" : "low",
        label: checkins.length===0 ? "First check-in due" : "Week 1 check-in received",
        desc:  checkins.length===0
          ? "Priya has not completed her first check-in yet — consider a nudge."
          : "Mood: "+(checkins[0].mood||"--")+" | Symptom: "+((checkins[0].symptomSev&&checkins[0].symptomSev.top)||"--")
            +" | Lifestyle: "+((checkins[0].lifestyle||[]).join(", ")||"--"),
        action: checkins.length===0 ? "Send nudge" : "Acknowledge"
    }] : []),
    // One queue item per subsequent check-in
    ...checkins.slice(1).map((c,i)=>({
        id:"checkin-w"+(i+2),
        priority: c.mood==="Marked" ? "high" : c.mood==="Low" ? "med" : "low",
        label:"Week "+(i+2)+" check-in received"+(c.mood==="Marked"||c.mood==="Low" ? " — low mood flagged" : ""),
        desc:"Mood: "+(c.mood||"--")+" | Symptom: "+((c.symptomSev&&c.symptomSev.top)||"--")
             +" | Lifestyle: "+((c.lifestyle||[]).join(", ")||"--"),
        action: c.mood==="Marked"||c.mood==="Low" ? "Follow up" : "Acknowledge"
    })),
    // 4-week milestone
    ...(checkins.length>=4 ? [{ id:"milestone-4", priority:"low",
        label:"4-week milestone reached",
        desc:"Priya has completed 4 check-ins. Consider sending a progress message.", action:"Send message" }] : []),
    // Re-plan trigger (every 4 weeks)
    ...(checkins.length>0&&checkins.length%4===0 ? [{ id:"replan-w"+checkins.length, priority:"med",
        label:"Plan re-draft ready (Week "+checkins.length+")",
        desc:"A plan delta is queued for clinician review.", action:"Notify clinician" }] : []),
  ];
  const open    = allItems.filter(i => !coordHandled[i.id]);
  const handled = allItems.filter(i =>  coordHandled[i.id]);

  return (
    <div className="console">
      <div className="console-head">
        <div><div className="eyebrow">Care coordinator</div><h2 className="console-title">Maya's queue</h2><div className="console-meta">{open.length} open · {handled.length} handled · 1 member (Priya S.)</div></div>
        <span className={"status-pill "+(open.length===0?"pill-ok":"pill-wait")}>{open.length===0?"All clear":`${open.length} needs attention`}</span>
      </div>

      <div className="console-tabs">
        {["queue","timeline","message"].map(t=><button key={t} className={"ctab"+(activeTab===t?" on":"")} onClick={()=>setActiveTab(t)}>{t==="queue"?"Attention queue":t==="timeline"?"Member timeline":"Send message"}</button>)}
      </div>

      {activeTab==="queue"&&(
        <div className="coord-queue">
          {open.length===0&&<div className="queue-clear"><Ic n="check" size={22}/>All caught up — no open items.</div>}
          {open.map(item=>(
            <div key={item.id} className={"queue-item priority-"+item.priority}>
              <div className="qi-left">
                <span className={"qi-dot dot-"+item.priority}/>
                <div><div className="qi-label">{item.label}</div><div className="qi-desc">{item.desc}</div></div>
              </div>
              <button className="btn btn-sm btn-primary" onClick={()=>setCoordHandled(s=>({...s,[item.id]:true}))}>{item.action}</button>
            </div>
          ))}
          {handled.length>0&&<div className="handled-section"><div className="phase-label">Handled</div>{handled.map(item=><div key={item.id} className="queue-item handled"><Ic n="check" size={13}/><span>{item.label} — done</span></div>)}</div>}
        </div>
      )}

      {activeTab==="timeline"&&(
        <div className="timeline">
          <div className="tl-member"><Ic n="user" size={14}/><b>Priya S.</b> · PCOS · {GOALS_LIST.find(g=>g.key===plan.primaryGoal)?.label||"—"}</div>
          <div className="tl-event tl-plan"><span className="tl-dot"/><div><b>Plan published</b> — {plan.modules.length} recommendations · v{plan.version}</div></div>
          {checkins.map((c,i)=>(
            <div key={i} className="tl-event tl-checkin">
              <span className="tl-dot"/>
              <div><b>Week {i+1} check-in</b> — Mood: {c.mood||"—"} · Symptom: {c.symptomSev?.top||"—"} · Lifestyle: {(c.lifestyle||[]).join(", ")||"—"}</div>
            </div>
          ))}
          {checkins.length===0&&<div className="tl-empty">No check-ins yet.</div>}
          {escalation&&<div className="tl-event tl-flag"><span className="tl-dot"/><div><b>Wellbeing flag</b> — marked low mood at intake</div></div>}
        </div>
      )}

      {activeTab==="message"&&(
        <div className="msg-panel">
          <div className="msg-to"><Ic n="user" size={13}/> To: Priya S.</div>
          <textarea className="textarea" rows={4} placeholder="Write a message to Priya — this will appear as a care companion note." value={coordNote} onChange={e=>setCoordNote(e.target.value)}/>
          <button className="btn btn-primary" disabled={!coordNote.trim()} onClick={()=>{ setCoordNote(""); }}>
            Send message <Ic n="send" size={14} cls="btn-arrow"/>
          </button>
          <div className="msg-note">Messages are private between care companion and member. Not visible to employers.</div>
        </div>
      )}
    </div>
  );
}

/* ═══ SMALL SHARED COMPONENTS ═══ */
function StepDots({ n, i, labels }) {
  return (
    <div className="step-dots">
      {Array.from({length:n}).map((_,k)=>(
        <div key={k} className={"step-dot-wrap"+(k===i?" on":k<i?" done":"")}>
          <span className="step-dot"/>
          <span className="step-label">{labels[k]}</span>
        </div>
      ))}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);





</script>
</body>
</html>
